<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata – LegoWorld</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0E1B2C;
      --paper: #EFE8D8;
      --paper-dim: #D8CFB8;
      --brass: #C9A227;
      --brass-dim: #8C7526;
      --text: #EAE4D2;
      --shadow: 0 12px 32px rgba(0,0,0,0.35);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 20% -10%, rgba(62,88,114,0.35), transparent 55%),
                  radial-gradient(ellipse at 90% 0%, rgba(201,162,39,0.10), transparent 45%),
                  var(--ink);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    .brick {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 5rem;
      font-weight: 700;
      color: var(--brass);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }
    p {
      font-size: 0.95rem;
      color: rgba(234,228,210,0.7);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a.btn {
      display: inline-block;
      background: var(--brass);
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 2rem;
      transition: background 0.2s;
    }
    a.btn:hover { background: var(--brass-dim); color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brick">🧱</div>
    <h1>404</h1>
    <h2>Mattoncino mancante!</h2>
    <p>La pagina che cerchi non esiste o è stata spostata.<br>Torna alla home e riprendi l'esplorazione.</p>
    <a class="btn" href="/legoworld/">← Torna alla Home</a>
  </div>
</body>
</html>
